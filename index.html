<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamPro - Mock Test Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn { transition: all 0.2s; }
        .active-q { border-left: 4px solid #2563eb; background-color: #eff6ff; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white shadow-sm p-4 mb-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tight">EXAM<span class="text-slate-800">PRO</span></h1>
            <div id="nav-timer" class="hidden font-mono text-xl font-bold text-red-600 bg-red-50 px-4 py-1 rounded-full border border-red-100">
                00:00
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4">
        
        <section id="creator-view" class="max-w-2xl mx-auto">
            <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
                <h2 class="text-2xl font-bold mb-2">Create New Mock Test</h2>
                <p class="text-slate-500 mb-6">Upload a CSV to generate a shareable test link.</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Test Title</label>
                        <input type="text" id="test-title" placeholder="e.g., RRB JE Physics Mock" class="w-full p-3 rounded-lg border border-slate-200 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Duration (Minutes)</label>
                        <input type="number" id="test-duration" value="90" class="w-full p-3 rounded-lg border border-slate-200 outline-none">
                    </div>
                    <div class="p-6 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 text-center">
                        <input type="file" id="csv-file" class="hidden" accept=".csv" onchange="updateFileName(this)">
                        <label for="csv-file" class="cursor-pointer">
                            <span id="file-label" class="text-slate-600 font-medium">Click to upload CSV questions</span>
                        </label>
                    </div>
                    <button id="create-btn" onclick="uploadTest()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl flex justify-center items-center gap-3">
                        <span id="btn-text">Generate Test Link</span>
                        <div id="btn-loader" class="loader hidden"></div>
                    </button>
                </div>

                <div id="share-area" class="mt-6 hidden p-4 bg-green-50 border border-green-200 rounded-lg">
                    <p class="text-green-800 text-sm font-medium">Test Created! Share this ID:</p>
                    <code id="share-id" class="block bg-white p-2 mt-2 rounded border font-mono font-bold text-center text-lg"></code>
                </div>
            </div>

            <div class="mt-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="font-bold mb-4">Take a Test or View History</h3>
                <div class="flex gap-2">
                    <input type="text" id="join-id" placeholder="Enter Test ID" class="flex-1 p-2 border rounded-lg outline-none">
                    <button onclick="loadTest(document.getElementById('join-id').value)" class="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold">Start</button>
                    <button onclick="fetchHistory(document.getElementById('join-id').value)" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg font-bold">History</button>
                </div>
                <div id="history-container" class="mt-4 space-y-2 hidden">
                    <p class="text-xs font-bold uppercase text-slate-400">Attempt Logs</p>
                    <div id="history-list" class="text-sm"></div>
                </div>
            </div>
        </section>

        <section id="test-view" class="hidden grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 bg-white p-4 rounded-xl shadow-sm border border-slate-100 h-fit">
                <h3 class="font-bold mb-4 flex justify-between">Questions <span id="q-progress" class="text-blue-600">0/0</span></h3>
                <div id="palette" class="grid grid-cols-5 gap-2"></div>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 min-h-[400px]">
                    <div class="flex justify-between items-start mb-6">
                        <span id="q-badge" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-md text-sm font-bold">Question 1</span>
                        <span class="text-slate-400 text-sm">Timer: <span id="q-timer" class="text-slate-900 font-mono font-bold">0s</span></span>
                    </div>
                    <p id="q-text" class="text-xl font-medium leading-relaxed text-slate-800 mb-8"></p>
                    <div id="options-container" class="space-y-3"></div>
                </div>

                <div class="flex justify-between items-center bg-white p-4 rounded-xl border border-slate-100">
                    <button onclick="prevQ()" class="px-6 py-2 border rounded-lg font-bold hover:bg-slate-50">Previous</button>
                    <button onclick="submitTest()" class="px-8 py-2 bg-red-600 text-white rounded-lg font-bold shadow-md hover:bg-red-700">Finish Test</button>
                    <button onclick="nextQ()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">Next</button>
                </div>
            </div>
        </section>

        <section id="results-view" class="hidden max-w-4xl mx-auto">
            <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-100 text-center">
                <h2 class="text-3xl font-black mb-2">Test Results</h2>
                <div id="final-score-box" class="text-5xl font-black text-blue-600 my-6">0.00</div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                    <div class="p-4 bg-green-50 rounded-xl"><p class="text-xs font-bold text-green-600">CORRECT</p><p id="stat-correct" class="text-2xl font-bold">0</p></div>
                    <div class="p-4 bg-red-50 rounded-xl"><p class="text-xs font-bold text-red-600">WRONG</p><p id="stat-wrong" class="text-2xl font-bold">0</p></div>
                    <div class="p-4 bg-slate-50 rounded-xl"><p class="text-xs font-bold text-slate-600">SKIPPED</p><p id="stat-skipped" class="text-2xl font-bold">0</p></div>
                    <div class="p-4 bg-blue-50 rounded-xl"><p class="text-xs font-bold text-blue-600">TIME</p><p id="stat-speed" class="text-2xl font-bold">0s</p></div>
                </div>

                <div id="detailed-analysis" class="text-left space-y-4"></div>
                <button onclick="location.reload()" class="mt-10 px-8 py-3 bg-slate-800 text-white rounded-xl font-bold">Back to Home</button>
            </div>
        </section>

    </main>

    <script>
        const API_BASE = "https://mocktest-app-ay8j.onrender.com";
        let testData = { questions: [], metadata: {} };
        let currentIdx = 0;
        let userAnswers = {};
        let questionTimeSpent = {};
        let totalSecondsLeft = 0;
        let globalTimer, questionTimer;

        function updateFileName(input) { document.getElementById('file-label').innerText = input.files[0].name; }

        async function uploadTest() {
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const fileInput = document.getElementById('csv-file');
            const title = document.getElementById('test-title').value;
            const duration = document.getElementById('test-duration').value;

            if(!fileInput.files[0] || !title) return alert("Please provide title and CSV file.");

            btnText.innerText = "Generating...";
            btnLoader.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('title', title);
            formData.append('duration', duration);

            try {
                const res = await fetch(`${API_BASE}/create-test-csv/`, { method: 'POST', body: formData });
                const data = await res.json();
                document.getElementById('share-area').classList.remove('hidden');
                document.getElementById('share-id').innerText = data.test_id;
            } catch (e) { alert("Upload failed. Check backend."); }
            
            btnText.innerText = "Generate Test Link";
            btnLoader.classList.add('hidden');
        }

        async function loadTest(testId) {
            try {
                const res = await fetch(`${API_BASE}/get-test/${testId}`);
                if(!res.ok) throw new Error();
                testData = await res.json();
                totalSecondsLeft = testData.metadata.duration_mins * 60;
                initTestUI();
            } catch(e) { alert("Invalid Test ID"); }
        }

        function initTestUI() {
            document.getElementById('creator-view').classList.add('hidden');
            document.getElementById('test-view').classList.remove('hidden');
            document.getElementById('nav-timer').classList.remove('hidden');
            renderPalette(); renderQuestion(); startTimers();
        }

        function startTimers() {
            globalTimer = setInterval(() => {
                totalSecondsLeft--;
                const m = Math.floor(totalSecondsLeft/60), s = totalSecondsLeft % 60;
                document.getElementById('nav-timer').innerText = `${m}:${s < 10 ? '0':''}${s}`;
                if(totalSecondsLeft <= 0) submitTest();
            }, 1000);
            questionTimer = setInterval(() => {
                questionTimeSpent[currentIdx] = (questionTimeSpent[currentIdx] || 0) + 1;
                document.getElementById('q-timer').innerText = questionTimeSpent[currentIdx] + "s";
            }, 1000);
        }

        function renderPalette() {
            const p = document.getElementById('palette'); p.innerHTML = '';
            testData.questions.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.innerText = i + 1;
                btn.className = `w-10 h-10 rounded border text-sm font-bold ${userAnswers[i] ? 'bg-green-500 text-white' : 'bg-slate-50'} ${i === currentIdx ? 'ring-2 ring-blue-600' : ''}`;
                btn.onclick = () => { currentIdx = i; renderQuestion(); };
                p.appendChild(btn);
            });
            document.getElementById('q-progress').innerText = `${Object.keys(userAnswers).length}/${testData.questions.length}`;
        }

        function renderQuestion() {
            const q = testData.questions[currentIdx];
            document.getElementById('q-badge').innerText = `Question ${currentIdx + 1}`;
            document.getElementById('q-text').innerText = q.question_text;
            const container = document.getElementById('options-container'); container.innerHTML = '';
            ['a', 'b', 'c', 'd'].forEach(letter => {
                const L = letter.toUpperCase();
                const isSel = userAnswers[currentIdx] === L;
                container.innerHTML += `<button onclick="select('${L}')" class="option-btn w-full p-4 rounded-xl border-2 text-left flex items-center gap-4 ${isSel ? 'border-blue-500 bg-blue-50' : 'border-slate-100'}">
                    <span class="w-8 h-8 rounded-full border flex items-center justify-center font-bold ${isSel ? 'bg-blue-600 text-white' : 'bg-white'}">${L}</span>
                    <span>${q['option_'+letter]}</span></button>`;
            });
            document.getElementById('q-timer').innerText = (questionTimeSpent[currentIdx] || 0) + "s";
            renderPalette();
        }

        function select(val) { userAnswers[currentIdx] = val; renderQuestion(); }
        function nextQ() { if(currentIdx < testData.questions.length - 1) { currentIdx++; renderQuestion(); } }
        function prevQ() { if(currentIdx > 0) { currentIdx--; renderQuestion(); } }

        async function submitTest() {
            clearInterval(globalTimer); clearInterval(questionTimer);
            let correct = 0, wrong = 0, totalTime = 0, detailed = {};
            
            testData.questions.forEach((q, i) => {
                const ans = userAnswers[i] || null;
                const time = questionTimeSpent[i] || 0;
                const isCorrect = ans === q.correct_option;
                if(ans) { if(isCorrect) correct++; else wrong++; }
                totalTime += time;
                detailed[i] = { ans, isCorrect, time };
            });

            const finalScore = (correct - (wrong * 0.33)).toFixed(2);
            
            // SAVE TO DB
            await fetch(`${API_BASE}/save-attempt/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    test_id: testData.metadata.test_id,
                    total_time_taken: totalTime,
                    questions_attempted: Object.keys(userAnswers).length,
                    correct_count: correct,
                    final_score: parseFloat(finalScore),
                    detailed_answers: detailed
                })
            });

            showResults(correct, wrong, totalTime, detailed, finalScore);
        }

        function showResults(c, w, tt, det, score) {
            document.getElementById('test-view').classList.add('hidden');
            document.getElementById('nav-timer').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');
            document.getElementById('final-score-box').innerText = score;
            document.getElementById('stat-correct').innerText = c;
            document.getElementById('stat-wrong').innerText = w;
            document.getElementById('stat-skipped').innerText = testData.questions.length - (c + w);
            document.getElementById('stat-speed').innerText = Math.round(tt/testData.questions.length) + "s";

            const container = document.getElementById('detailed-analysis');
            container.innerHTML = testData.questions.map((q, i) => `
                <div class="p-4 rounded-lg ${det[i].isCorrect ? 'bg-green-50' : (det[i].ans ? 'bg-red-50' : 'bg-slate-50')}">
                    <p class="font-bold text-sm">Q${i+1}: ${q.question_text}</p>
                    <p class="text-xs text-slate-500">Correct: ${q.correct_option} | Yours: ${det[i].ans || 'Skipped'} | Time: ${det[i].time}s</p>
                </div>`).join('');
        }

        async function fetchHistory(testId) {
            if(!testId) return alert("Enter Test ID first");
            const res = await fetch(`${API_BASE}/attempts/${testId}`);
            const attempts = await res.json();
            const histCont = document.getElementById('history-container');
            const histList = document.getElementById('history-list');
            histCont.classList.remove('hidden');
            histList.innerHTML = attempts.length ? attempts.map(a => `
                <div class="flex justify-between py-2 border-b">
                    <span>${new Date(a.created_at).toLocaleDateString()}</span>
                    <span class="font-bold text-blue-600">Score: ${a.final_score}</span>
                    <span class="text-slate-400">${Math.floor(a.total_time_taken/60)}m</span>
                </div>`).join('') : "No attempts yet.";
        }
    </script>
</body>
</html>
